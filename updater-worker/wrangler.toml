name = "fgo-data-updater"
main = "index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[triggers]
crons = ["*/30 * * * *"] # 30 分ごとに実行 (失敗時の MTTR 短縮)

# 注: このアカウントは Workers 無料プランのため [limits](cpu_ms / subrequests)は
# 設定不可(設定すると wrangler deploy が code:100328 で失敗する)。subrequest 上限
# (無料は 1 invocation あたり少ない)対策はコード側(waveCount KV seed / per-servant
# 取得の最小化)で行うこと。

[[kv_namespaces]]
binding = "MASTER_DATA"
id = "306bbe537e9d4907809f82468df500e4"

[observability]
enabled = true
