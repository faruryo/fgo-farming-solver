name: Update rarity AP tables

# 旧 fgo-rarity-updater worker(1時間ごとの cron)の移管先。
# 移管理由は update-master-data.yml と同じ(無料プランの確率的 CPU kill の回避)。
# 処理本体: scripts/run-rarity-updater.ts(指紋ゲートつき LP ソルブ → rarity_ap_tables)。
# master-data 更新(毎時 :08/:38)の後に走るよう :52 を指定。混雑帯(:00/:15/:30/:45)
# は GitHub scheduler に間引かれるため避ける(update-master-data.yml の注を参照)。

on:
  schedule:
    - cron: '52 * * * *'
  workflow_dispatch:

concurrency:
  group: update-rarity-tables
  cancel-in-progress: false

jobs:
  update:
    name: Update rarity AP tables KV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rarity AP tables update
        run: pnpm exec tsx scripts/run-rarity-updater.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
