name: Update master data

# 旧 fgo-data-updater worker(30分ごとの cron)の移管先。
# Workers 無料プランは公称 CPU 10ms 超の invocation を確率的に kill するため
# (実測: 改善後でも定常 ~120ms → 時折 exceededCpu)、CPU 無制限の CI で実行する。
# 処理本体: scripts/run-updater.ts(drops / dashboard_meta / servants_list を KV へ)。
# 注: GitHub の schedule は混雑時に数分遅延することがあるが、30分周期の鮮度要件には十分。

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: update-master-data
  cancel-in-progress: false

jobs:
  update:
    name: Update master data KV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run master data update
        run: pnpm exec tsx scripts/run-updater.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
