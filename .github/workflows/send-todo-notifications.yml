name: Send TODO deadline notifications

# デイリー/ウィークリー/イベント交換/カスタム TODO の期限間近リマインダを
# Web Push で配信する毎時バッチ。Workers 無料プランの CPU 制限を回避するため、
# 通知配信専用の Worker エンドポイントは設けず、本ワークフロー(GH Actions
# ランナー、CPU 無制限)が wrangler CLI で D1/KV を直接読み書きし、VAPID
# 暗号化・送信までを完結させる
# (refresh-event-data.yml / update-master-data.yml と同じ「重い処理は CI 側」方針。
# 詳細は openspec/changes/todo-management/design.md Decisions #3)。
#
# notification_log への ON CONFLICT DO NOTHING アトミック insert により、
# 毎時実行が重複・遅延しても同一 notification_key への二重送信は起きない
# (scripts/send-todo-notifications.ts 冒頭コメント参照)。

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send:
    name: Send push notifications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run notification dispatcher
        run: pnpm exec tsx scripts/send-todo-notifications.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
