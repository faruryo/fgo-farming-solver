name: CI / Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths-ignore:
      - 'openspec/**'
      - 'docs/**'
      - '.agents/**'
      - '.agent/**'
      - '.claude/**'
      - '.codex/**'
      - '.serena/**'
      - '.github/instructions/**'
      - 'skills-lock.json'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'deployment_guide.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'openspec/**'
      - 'docs/**'
      - '.agents/**'
      - '.agent/**'
      - '.claude/**'
      - '.codex/**'
      - '.serena/**'
      - '.github/instructions/**'
      - 'skills-lock.json'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'deployment_guide.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Apply D1 migrations (local)
        run: pnpm exec wrangler d1 migrations apply fgo-farming-solver-db --local

      - name: Test
        run: pnpm test --run

  build:
    name: Build
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        env:
          # Cloudflare Web Analytics beacon token。ブラウザに配信される公開値で秘密ではない。
          # NEXT_PUBLIC_ はビルド時インラインのため、static prerender にも焼き込むにはここで供給する。
          NEXT_PUBLIC_CF_BEACON_TOKEN: "c3599281fa6d4ae4a4ba26e996b8fb45" # gitleaks:allow
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: open-next-build
          path: .open-next/
          retention-days: 1
          include-hidden-files: true

  deploy-main:
    name: Deploy Main App
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: open-next-build
          path: .open-next/
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run D1 Database Migrations
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply fgo-farming-solver-db --remote
          wranglerVersion: "4.87.0"
          packageManager: pnpm

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: "4.87.0"
          packageManager: pnpm

  # 旧 deploy-updater / deploy-rarity ジョブは廃止: master-data / rarity 更新は
  # cron worker から GitHub Actions の定期ワークフローへ移管した
  # (.github/workflows/update-master-data.yml / update-rarity-tables.yml)。
