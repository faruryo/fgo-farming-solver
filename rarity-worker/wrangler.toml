name = "fgo-rarity-updater"
main = "index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# rarity AP テーブルの再計算だけを行う専用 cron worker。
# 本体 updater (fgo-data-updater) から分離した理由:
#   無料プランは 1 invocation あたりの subrequest 上限が低く、かつ [limits] で
#   引き上げられない。rarity 計算は per-servant 取得 (~25 件) を含むため、本体と
#   同居すると上限を超える。独立 worker なら独自の subrequest 予算で収まる。
# rarity テーブルは drop_rate / サーヴァント素材の変化(週〜隔週)に依存するため
# 高頻度更新は不要。1 時間ごと(検証・鮮度のバランス)。
[triggers]
crons = ["0 * * * *"]

[[kv_namespaces]]
binding = "MASTER_DATA"
id = "306bbe537e9d4907809f82468df500e4"

[observability]
enabled = true
